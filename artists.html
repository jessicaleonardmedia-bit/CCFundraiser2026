<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Artists — Conners Conners Fundraiser 2026</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --black: #0a0a0a;
    --white: #ffffff;
    --off-white: #f8f8f8;
    --light-gray: #eeeeee;
    --mid-gray: #999999;
    --border: #e0e0e0;
    --pending: #b07d3a;
    --sold: #999999;
    --font: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, Arial, sans-serif;
  }
  html { scroll-behavior: smooth; }
  body { font-family: var(--font); background: var(--white); color: var(--black); min-height: 100vh; font-size: 14px; }

  /* HEADER */
  header { padding: 0 24px; display: flex; align-items: center; justify-content: space-between; height: 48px; position: sticky; top: 0; background: var(--white); z-index: 100; border-bottom: 1px solid var(--border); }
  .logo { font-size: 14px; font-weight: 700; color: var(--black); text-decoration: none; }
  nav { display: flex; gap: 0; }
  nav a { font-size: 13px; color: var(--mid-gray); text-decoration: none; padding: 0 14px; height: 48px; display: flex; align-items: center; border-left: 1px solid var(--border); transition: color 0.1s; }
  nav a:hover { color: var(--black); }
  nav a.active { color: var(--black); font-weight: 700; }

  /* INTRO */
  .intro { padding: 40px 24px 32px; border-bottom: 1px solid var(--border); max-width: 600px; }
  .intro-eyebrow { font-size: 12px; color: var(--mid-gray); margin-bottom: 8px; }
  .intro h1 { font-size: 22px; font-weight: 700; margin-bottom: 0; line-height: 1.2; }

  /* ARTIST LIST */
  .artist-section { border-bottom: 1px solid var(--border); }

  .artist-header {
    padding: 24px 24px 20px;
    display: grid;
    grid-template-columns: 1fr auto;
    align-items: start;
    gap: 16px;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    user-select: none;
    transition: background 0.1s;
  }
  .artist-header:hover { background: var(--off-white); }

  .artist-name { font-size: 18px; font-weight: 700; margin-bottom: 4px; }
  .artist-represented { font-size: 12px; color: var(--mid-gray); }
  .artist-work-count { font-size: 12px; color: var(--mid-gray); white-space: nowrap; margin-top: 4px; text-align: right; }

  .artist-works {
    display: none;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    background: var(--off-white);
    border-top: 1px solid var(--border);
  }
  .artist-section.expanded .artist-works { display: grid; }

  .chevron { font-size: 11px; color: var(--mid-gray); transition: transform 0.2s; margin-top: 6px; }
  .artist-section.expanded .chevron { transform: rotate(180deg); }

  /* WORK CARDS (compact) */
  .work-card-sm {
    cursor: pointer;
    border-bottom: 1px solid var(--border);
    border-right: 1px solid var(--border);
    transition: background 0.1s;
    background: var(--white);
  }
  .work-card-sm:hover { background: var(--off-white); }
  .work-image-wrap { width: 100%; aspect-ratio: 4/3; overflow: hidden; background: var(--light-gray); display: flex; align-items: center; justify-content: center; }
  .work-image-wrap img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .work-image-placeholder { font-size: 11px; color: var(--mid-gray); text-transform: uppercase; letter-spacing: 0.06em; }
  .work-info-sm { padding: 10px 14px 14px; }
  .work-title-sm { font-size: 13px; color: #444; margin-bottom: 6px; }
  .work-footer-sm { display: flex; align-items: center; justify-content: space-between; }
  .work-price-sm { font-size: 12px; font-weight: 700; }
  .status-badge { font-size: 11px; letter-spacing: 0.04em; text-transform: uppercase; padding: 2px 7px; border: 1px solid currentColor; transition: color 0.3s; }
  .status-available { color: var(--black); }
  .status-pending { color: var(--pending); }
  .status-sold { color: var(--sold); }

  @keyframes statusFlash { 0%{opacity:0.2} 50%{opacity:1} 100%{opacity:1} }
  .status-changed { animation: statusFlash 0.6s ease-out; }

  /* MODAL */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 200; align-items: center; justify-content: center; padding: 20px; }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--white); max-width: 820px; width: 100%; max-height: 92vh; overflow-y: auto; display: grid; grid-template-columns: 1.1fr 1fr; position: relative; }
  @media (max-width: 600px) { .modal { grid-template-columns: 1fr; } nav a { padding: 0 10px; font-size: 12px; } }
  .modal-image-panel { background: var(--light-gray); display: flex; align-items: center; justify-content: center; min-height: 320px; }
  .modal-image-panel img { width: 100%; height: 100%; object-fit: contain; max-height: 480px; display: block; }
  .modal-close { position: absolute; top: 12px; right: 12px; background: var(--white); border: 1px solid var(--border); width: 28px; height: 28px; cursor: pointer; font-size: 14px; display: flex; align-items: center; justify-content: center; color: var(--black); z-index: 10; font-family: var(--font); }
  .modal-content { padding: 32px 28px; display: flex; flex-direction: column; border-left: 1px solid var(--border); }
  .modal-artist { font-size: 14px; font-weight: 700; margin-bottom: 2px; }
  .modal-represented { font-size: 11px; color: var(--mid-gray); margin-bottom: 10px; }
  .modal-title { font-size: 14px; color: #444; margin-bottom: 12px; }
  .modal-meta { font-size: 12px; color: var(--mid-gray); margin-bottom: 16px; line-height: 1.7; border-top: 1px solid var(--border); padding-top: 12px; }
  .modal-price { font-size: 20px; font-weight: 700; margin-bottom: 6px; }
  .modal-status { margin-bottom: 20px; }

  .purchase-section h3 { font-size: 11px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; color: var(--mid-gray); margin-bottom: 10px; }
  .purchase-options { display: flex; flex-direction: column; gap: 8px; }
  .btn { display: block; width: 100%; padding: 11px 16px; font-family: var(--font); font-size: 12px; font-weight: 700; letter-spacing: 0.04em; text-transform: uppercase; cursor: pointer; border: 1px solid var(--black); transition: all 0.1s; text-align: center; text-decoration: none; }
  .btn-primary { background: var(--black); color: var(--white); }
  .btn-primary:hover { background: #333; }
  .btn-outline { background: transparent; color: var(--black); }
  .btn-outline:hover { background: var(--off-white); }
  .btn-disabled { background: var(--light-gray); color: var(--mid-gray); border-color: var(--border); cursor: not-allowed; }
  .waitlist-note { font-size: 11px; color: var(--mid-gray); text-align: center; line-height: 1.6; margin-top: 8px; }

  .commit-form { display: none; flex-direction: column; gap: 12px; }
  .commit-form.open { display: flex; }
  .form-section-title { font-size: 11px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; color: var(--mid-gray); padding-bottom: 10px; border-bottom: 1px solid var(--border); }
  .form-label { font-size: 11px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; color: var(--mid-gray); margin-bottom: 4px; display: block; }
  .form-group { display: flex; flex-direction: column; }
  .form-group input { border: 1px solid var(--border); padding: 9px 10px; font-family: var(--font); font-size: 13px; background: var(--white); color: var(--black); outline: none; transition: border-color 0.1s; border-radius: 0; -webkit-appearance: none; }
  .form-group input:focus { border-color: var(--black); }
  .checkbox-group { display: flex; gap: 10px; align-items: flex-start; }
  .checkbox-group input[type="checkbox"] { margin-top: 2px; flex-shrink: 0; accent-color: var(--black); width: 14px; height: 14px; }
  .checkbox-group label { font-size: 11px; color: var(--mid-gray); line-height: 1.6; }
  .form-back { background: none; border: none; font-size: 11px; color: var(--mid-gray); cursor: pointer; text-decoration: underline; text-align: left; padding: 0; font-family: var(--font); }

  .success-state { display: none; flex-direction: column; gap: 10px; padding: 16px 0; }
  .success-state.open { display: flex; }
  .success-title { font-size: 15px; font-weight: 700; }
  .success-body { font-size: 12px; color: #444; line-height: 1.6; }

  .page-message { padding: 80px 24px; text-align: center; font-size: 12px; color: var(--mid-gray); text-transform: uppercase; letter-spacing: 0.06em; }
  .error-banner { display: none; background: #fff8e1; border-bottom: 1px solid #ffe082; padding: 10px 24px; font-size: 12px; color: #7a5a00; }
  footer { border-top: 1px solid var(--border); padding: 24px; font-size: 12px; color: var(--mid-gray); display: flex; justify-content: space-between; flex-wrap: wrap; gap: 8px; }
</style>
</head>
<body>

<header>
  <a href="index.html" class="logo">Conners Conners</a>
  <nav>
    <a href="index.html">Works</a>
    <a href="artists.html" class="active">Artists</a>
  </nav>
</header>

<div class="error-banner" id="error-banner">
  Unable to load works from the sheet — check your connection and refresh.
</div>

<section class="intro">
  <p class="intro-eyebrow">Conners Conners Gallery — Fundraiser 2026</p>
  <h1>Artists</h1>
</section>

<main id="artist-list">
  <div class="page-message">Loading artists…</div>
</main>

<footer>
  <span>Conners Conners Gallery</span>
  <span id="footer-year"></span>
</footer>

<!-- MODAL (identical to index.html) -->
<div class="modal-overlay" id="modal-overlay" role="dialog" aria-modal="true">
  <div class="modal">
    <div class="modal-image-panel">
      <span class="work-image-placeholder" id="modal-img-placeholder">No image</span>
      <img id="modal-img" src="" alt="" style="display:none">
    </div>
    <div class="modal-content">
      <button class="modal-close" id="modal-close" aria-label="Close">✕</button>
      <p class="modal-artist" id="modal-artist"></p>
      <p class="modal-represented" id="modal-represented" style="display:none"></p>
      <p class="modal-title" id="modal-title"></p>
      <div class="modal-meta" id="modal-meta"></div>
      <div class="modal-price" id="modal-price"></div>
      <div class="modal-status" id="modal-status"></div>

      <div class="purchase-section" id="purchase-section">
        <h3>Purchase this work</h3>
        <div class="purchase-options">
          <button class="btn btn-primary" id="btn-transfer" onclick="showForm('transfer')">Commit — bank transfer</button>
          <button class="btn btn-outline" id="btn-desk" onclick="showForm('desk')">Commit — pay at desk</button>
        </div>
      </div>

      <form class="commit-form" id="commit-form" onsubmit="submitCommit(event)">
        <div class="form-section-title" id="form-title">Commit to purchase</div>
        <div class="form-group">
          <label class="form-label">Full name</label>
          <input type="text" id="f-name" required placeholder="Your name">
        </div>
        <div class="form-group">
          <label class="form-label">Email</label>
          <input type="email" id="f-email" required placeholder="your@email.com">
        </div>
        <div class="form-group">
          <label class="form-label">Phone</label>
          <input type="tel" id="f-phone" required placeholder="04xx xxx xxx">
        </div>
        <div class="checkbox-group" id="transfer-checkbox-group" style="display:none">
          <input type="checkbox" id="f-commit-check">
          <label for="f-commit-check">I commit to transferring payment within 48 hours of receiving bank details from Conners Conners.</label>
        </div>
        <button type="submit" class="btn btn-primary" id="submit-btn">Submit commitment</button>
        <button type="button" class="form-back" onclick="showPurchaseOptions()">← Back</button>
      </form>

      <div class="success-state" id="success-state">
        <div class="success-title">You're in the queue.</div>
        <div class="success-body" id="success-body"></div>
        <button class="btn btn-outline" onclick="closeModal()" style="width:auto;padding:9px 20px;margin-top:4px">Close</button>
      </div>

      <div id="sold-state" style="display:none">
        <p class="waitlist-note">This work has been sold.</p>
      </div>
    </div>
  </div>
</div>

<script>
const SHEET_API_URL = 'https://script.google.com/macros/s/AKfycbwm1RTBH6_pfJgPmzQApy4FbOFqQJmwVOAgpdzrS-45Yp_j88qRJyZnBeCX-5ovgaR8/exec';
const POLL_INTERVAL = 30000;

let allWorks = [], currentWork = null, commitType = '';

document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('footer-year').textContent = new Date().getFullYear();
  loadWorks();
  document.getElementById('modal-overlay').addEventListener('click', e => {
    if (e.target === document.getElementById('modal-overlay')) closeModal();
  });
  document.getElementById('modal-close').addEventListener('click', closeModal);
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });
  setInterval(pollStatus, POLL_INTERVAL);
});

async function loadWorks() {
  try {
    const res = await fetch(SHEET_API_URL + '?action=getWorks');
    const data = await res.json();
    if (data.works && data.works.length > 0) {
      allWorks = data.works.filter(w => w.id && (w.artist || w.title));
      renderArtists();
      return;
    }
  } catch(e) {
    document.getElementById('error-banner').style.display = 'block';
  }
  allWorks = [{ id: 'w001', artist: 'Ry Haskings', title: 'Rolpanel Nova Kickback', status: 'available', imageUrl: '', price: '', representedBy: 'Conners Conners' }];
  renderArtists();
}

function renderArtists() {
  const container = document.getElementById('artist-list');

  // Group works by artist, preserving first-seen order
  const artistMap = new Map();
  allWorks.forEach(w => {
    const name = w.artist || 'Unknown artist';
    if (!artistMap.has(name)) artistMap.set(name, { name, representedBy: w.representedBy || '', works: [] });
    artistMap.get(name).works.push(w);
  });

  const artists = Array.from(artistMap.values()).sort((a,b) => {
    // Sort by last name
    const lastName = n => n.split(' ').pop().toLowerCase();
    return lastName(a.name).localeCompare(lastName(b.name));
  });

  if (!artists.length) {
    container.innerHTML = '<div class="page-message">No artists found.</div>';
    return;
  }

  container.innerHTML = artists.map(artist => {
    const availCount = artist.works.filter(w => w.status === 'available').length;
    const total = artist.works.length;
    const countLabel = availCount === total
      ? `${total} work${total !== 1 ? 's' : ''}`
      : `${availCount} of ${total} work${total !== 1 ? 's' : ''} available`;

    return `
      <div class="artist-section" id="artist-${slugify(artist.name)}">
        <div class="artist-header" onclick="toggleArtist('${slugify(artist.name)}')">
          <div>
            <div class="artist-name">${esc(artist.name)}</div>
            ${artist.representedBy ? `<div class="artist-represented">Represented by ${esc(artist.representedBy)}</div>` : ''}
          </div>
          <div style="text-align:right">
            <div class="artist-work-count">${countLabel}</div>
            <div class="chevron">▾</div>
          </div>
        </div>
        <div class="artist-works">
          ${artist.works.map(w => `
            <div class="work-card-sm" data-work-id="${w.id}" onclick="openWork('${w.id}')">
              <div class="work-image-wrap">
                ${w.imageUrl ? `<img src="${esc(w.imageUrl)}" alt="${esc(w.title||'')}" loading="lazy">` : '<span class="work-image-placeholder">No image</span>'}
              </div>
              <div class="work-info-sm">
                <div class="work-title-sm">${esc(w.title||'Untitled')}</div>
                <div class="work-footer-sm">
                  <span class="work-price-sm">${w.price ? '$'+Number(w.price).toLocaleString() : ''}</span>
                  <span class="status-badge status-${w.status||'available'}">${statusLabel(w.status)}</span>
                </div>
              </div>
            </div>`).join('')}
        </div>
      </div>`;
  }).join('');
}

function toggleArtist(slug) {
  document.getElementById('artist-' + slug)?.classList.toggle('expanded');
}

// Live polling — same logic as index.html
async function pollStatus() {
  try {
    const res = await fetch(SHEET_API_URL + '?action=getWorks');
    const data = await res.json();
    if (!data.works) return;
    const fresh = data.works.filter(w => w.id && (w.artist || w.title));
    fresh.forEach(fw => {
      const existing = allWorks.find(w => w.id === fw.id);
      if (!existing || existing.status === fw.status) return;
      existing.status = fw.status;
      document.querySelectorAll(`[data-work-id="${fw.id}"] .status-badge`).forEach(badge => {
        badge.className = `status-badge status-${fw.status}`;
        badge.textContent = statusLabel(fw.status);
        badge.classList.add('status-changed');
        setTimeout(() => badge.classList.remove('status-changed'), 700);
      });
      if (currentWork && currentWork.id === fw.id) {
        currentWork.status = fw.status;
        document.getElementById('modal-status').innerHTML = `<span class="status-badge status-${fw.status}">${statusLabel(fw.status)}</span>`;
        if (fw.status === 'sold') {
          document.getElementById('purchase-section').style.display = 'none';
          document.getElementById('commit-form').classList.remove('open');
          document.getElementById('sold-state').style.display = 'block';
        }
      }
    });
  } catch(e) {}
}

function openWork(id) {
  currentWork = allWorks.find(w => w.id === id);
  if (!currentWork) return;
  const img = document.getElementById('modal-img');
  const ph = document.getElementById('modal-img-placeholder');
  if (currentWork.imageUrl) { img.src = currentWork.imageUrl; img.alt = currentWork.title||''; img.style.display='block'; ph.style.display='none'; }
  else { img.style.display='none'; ph.style.display='block'; }
  document.getElementById('modal-artist').textContent = currentWork.artist||'Unknown artist';
  const repEl = document.getElementById('modal-represented');
  if (currentWork.representedBy) { repEl.textContent = 'Represented by ' + currentWork.representedBy; repEl.style.display='block'; }
  else { repEl.style.display='none'; }
  document.getElementById('modal-title').textContent = currentWork.title||'Untitled';
  document.getElementById('modal-meta').innerHTML = [currentWork.medium, currentWork.dimensions, currentWork.year].filter(Boolean).join('<br>');
  document.getElementById('modal-price').textContent = currentWork.price ? '$'+Number(currentWork.price).toLocaleString() : '';
  document.getElementById('modal-status').innerHTML = `<span class="status-badge status-${currentWork.status||'available'}">${statusLabel(currentWork.status)}</span>`;
  showPurchaseOptions();
  document.getElementById('modal-overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
  document.body.style.overflow = '';
  currentWork = null;
}

function showPurchaseOptions() {
  document.getElementById('purchase-section').style.display = 'block';
  document.getElementById('commit-form').classList.remove('open');
  document.getElementById('success-state').classList.remove('open');
  document.getElementById('sold-state').style.display = 'none';
  const s = currentWork?.status || 'available';
  if (s === 'sold') { document.getElementById('purchase-section').style.display='none'; document.getElementById('sold-state').style.display='block'; return; }
  const pend = s === 'pending';
  document.getElementById('btn-transfer').textContent = pend ? 'Join waitlist — bank transfer' : 'Commit — bank transfer';
  document.getElementById('btn-desk').textContent = pend ? 'Join waitlist — pay at desk' : 'Commit — pay at desk';
}

function showForm(type) {
  commitType = type;
  document.getElementById('purchase-section').style.display = 'none';
  document.getElementById('commit-form').classList.add('open');
  const pend = currentWork?.status === 'pending';
  document.getElementById('form-title').textContent = pend
    ? (type==='transfer' ? 'Join waitlist — bank transfer' : 'Join waitlist — pay at desk')
    : (type==='transfer' ? 'Commit — bank transfer' : 'Commit — pay at desk');
  const cbg = document.getElementById('transfer-checkbox-group');
  cbg.style.display = type==='transfer' ? 'flex' : 'none';
  document.getElementById('f-commit-check').required = type==='transfer';
}

async function submitCommit(e) {
  e.preventDefault();
  const btn = document.getElementById('submit-btn');
  btn.textContent = 'Submitting…'; btn.disabled = true;
  const payload = {
    action: 'commitPurchase',
    workId: currentWork.id, workTitle: currentWork.title, artist: currentWork.artist, price: currentWork.price,
    name: document.getElementById('f-name').value.trim(),
    email: document.getElementById('f-email').value.trim(),
    phone: document.getElementById('f-phone').value.trim(),
    paymentType: commitType, timestamp: new Date().toISOString(),
  };
  let success = false;
  try {
    const res = await fetch(SHEET_API_URL, { method:'POST', headers:{'Content-Type':'text/plain'}, body: JSON.stringify(payload) });
    const data = await res.json();
    success = data.success;
    if (data.works) { allWorks = data.works.filter(w => w.id && (w.artist||w.title)); renderArtists(); }
  } catch(err) { console.error(err); }
  document.getElementById('commit-form').classList.remove('open');
  document.getElementById('success-state').classList.add('open');
  document.getElementById('success-body').innerHTML = success
    ? (commitType==='transfer'
        ? `Your commitment for <strong>${esc(currentWork.title||'this work')}</strong> has been received. Conners Conners will be in touch with bank details.`
        : `Your commitment to pay at the desk for <strong>${esc(currentWork.title||'this work')}</strong> has been received.`)
    : 'There was an issue submitting. Please speak to a volunteer.';
  e.target.reset(); btn.disabled=false; btn.textContent='Submit commitment';
}

function slugify(s) { return String(s||'').toLowerCase().replace(/[^a-z0-9]/g,'-').replace(/-+/g,'-'); }
function statusLabel(s) { return s==='sold'?'Sold':s==='pending'?'Pending':'Available'; }
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
</script>
</body>
</html>
