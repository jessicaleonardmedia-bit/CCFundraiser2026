<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Volunteer Dashboard — Conners Conners</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --black: #0a0a0a;
    --white: #ffffff;
    --off-white: #f8f8f8;
    --light-gray: #eeeeee;
    --mid-gray: #999999;
    --border: #e0e0e0;
    --pending: #b07d3a;
    --pending-bg: #fdf3e3;
    --available: #2d6a4f;
    --available-bg: #edf5f0;
    --sold: #999999;
    --danger: #b03a3a;
    --danger-bg: #fdf0f0;
    --font: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, Arial, sans-serif;
  }
  html, body { font-family: var(--font); background: var(--off-white); color: var(--black); font-size: 14px; min-height: 100vh; }

  /* LOGIN */
  .login-screen { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; background: var(--white); }
  .login-box { max-width: 340px; width: 100%; }
  .login-box h1 { font-size: 18px; font-weight: 700; margin-bottom: 4px; }
  .login-box .sub { font-size: 12px; color: var(--mid-gray); margin-bottom: 24px; }
  .field-label { font-size: 11px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; color: var(--mid-gray); display: block; margin-bottom: 5px; }
  .field-input { border: 1px solid var(--border); padding: 10px 12px; font-family: var(--font); font-size: 14px; background: var(--white); color: var(--black); outline: none; width: 100%; transition: border-color 0.1s; border-radius: 0; -webkit-appearance: none; }
  .field-input:focus { border-color: var(--black); }
  .login-error { font-size: 12px; color: var(--danger); margin: 8px 0; display: none; }
  .btn { display: block; width: 100%; padding: 11px 16px; font-family: var(--font); font-size: 12px; font-weight: 700; letter-spacing: 0.04em; text-transform: uppercase; cursor: pointer; border: 1px solid var(--black); background: var(--black); color: var(--white); text-align: center; margin-top: 12px; transition: background 0.1s; }
  .btn:hover { background: #333; }
  .btn-outline { background: transparent; color: var(--black); }
  .btn-outline:hover { background: var(--off-white); }
  .btn-sm { font-family: var(--font); font-size: 11px; font-weight: 700; letter-spacing: 0.04em; text-transform: uppercase; padding: 6px 12px; border: 1px solid; cursor: pointer; transition: all 0.1s; background: transparent; }

  /* DASHBOARD */
  .dashboard { display: none; }
  .dashboard.open { display: block; }

  header { background: var(--white); border-bottom: 1px solid var(--border); padding: 0 24px; height: 48px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
  .logo { font-size: 14px; font-weight: 700; color: var(--black); }
  .header-tag { font-size: 11px; color: var(--mid-gray); margin-left: 10px; }
  .header-actions { display: flex; gap: 8px; align-items: center; }
  .btn-sm-default { border-color: var(--border); color: var(--black); }
  .btn-sm-default:hover { border-color: var(--black); }
  .btn-sm-danger { border-color: var(--danger); color: var(--danger); }
  .btn-sm-danger:hover { background: var(--danger-bg); }

  /* STATS */
  .stats-bar { background: var(--white); border-bottom: 1px solid var(--border); padding: 0 24px; display: flex; overflow-x: auto; }
  .stat { padding: 14px 24px 14px 0; display: flex; flex-direction: column; gap: 2px; min-width: 80px; border-right: 1px solid var(--border); margin-right: 24px; }
  .stat:last-child { border-right: none; }
  .stat-value { font-size: 26px; font-weight: 700; line-height: 1; }
  .stat-label { font-size: 11px; color: var(--mid-gray); text-transform: uppercase; letter-spacing: 0.06em; }

  /* CONTROLS */
  .controls { padding: 16px 24px; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; background: var(--off-white); border-bottom: 1px solid var(--border); }
  .search-input { border: 1px solid var(--border); background: var(--white); padding: 8px 12px; font-family: var(--font); font-size: 12px; outline: none; transition: border-color 0.1s; min-width: 200px; border-radius: 0; }
  .search-input:focus { border-color: var(--black); }
  .filter-select { border: 1px solid var(--border); background: var(--white); padding: 8px 12px; font-family: var(--font); font-size: 12px; outline: none; cursor: pointer; color: var(--black); border-radius: 0; -webkit-appearance: none; }
  .close-all-btn { margin-left: auto; font-family: var(--font); font-size: 11px; font-weight: 700; letter-spacing: 0.04em; text-transform: uppercase; padding: 8px 16px; border: 1px solid var(--danger); background: transparent; color: var(--danger); cursor: pointer; transition: all 0.1s; }
  .close-all-btn:hover { background: var(--danger-bg); }

  /* WORK LIST */
  .work-list { padding: 20px 24px; display: flex; flex-direction: column; gap: 10px; }
  .work-row { background: var(--white); border: 1px solid var(--border); overflow: hidden; }
  .work-row.status-pending { border-left: 3px solid var(--pending); }
  .work-row.status-sold { border-left: 3px solid var(--mid-gray); opacity: 0.6; }
  .work-row.status-available { border-left: 3px solid var(--black); }
  .work-row-header { padding: 14px 18px; display: grid; grid-template-columns: 1fr auto auto; align-items: center; gap: 14px; cursor: pointer; user-select: none; }
  .work-row-artist { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: var(--mid-gray); margin-bottom: 2px; }
  .work-row-title { font-size: 14px; font-weight: 700; }
  .work-row-meta { font-size: 11px; color: var(--mid-gray); margin-top: 2px; }
  .work-row-price { font-size: 13px; font-weight: 700; white-space: nowrap; }
  .work-row-badges { display: flex; align-items: center; gap: 8px; }
  .status-badge { font-size: 10px; letter-spacing: 0.04em; text-transform: uppercase; padding: 2px 7px; border: 1px solid currentColor; white-space: nowrap; }
  .badge-available { color: var(--black); }
  .badge-pending { color: var(--pending); }
  .badge-sold { color: var(--sold); }
  .queue-count { font-size: 10px; background: var(--pending-bg); color: var(--pending); border: 1px solid var(--pending); padding: 2px 7px; white-space: nowrap; }
  .chevron { font-size: 11px; color: var(--mid-gray); transition: transform 0.2s; }
  .work-row.expanded .chevron { transform: rotate(180deg); }

  .work-row-detail { display: none; border-top: 1px solid var(--border); background: var(--off-white); }
  .work-row.expanded .work-row-detail { display: block; }
  .detail-inner { padding: 18px; display: flex; flex-direction: column; gap: 14px; }

  .queue-section h4 { font-size: 11px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; color: var(--mid-gray); margin-bottom: 10px; }
  .queue-empty { font-size: 12px; color: var(--mid-gray); }
  .queue-item { background: var(--white); border: 1px solid var(--border); padding: 12px 14px; display: grid; grid-template-columns: 24px 1fr auto; gap: 12px; align-items: start; margin-bottom: 8px; }
  .queue-position { font-size: 11px; color: var(--mid-gray); text-align: center; padding-top: 2px; font-weight: 700; }
  .queue-position.first { color: var(--pending); }
  .queue-buyer-name { font-size: 14px; font-weight: 700; margin-bottom: 3px; }
  .queue-buyer-contact { font-size: 11px; color: var(--mid-gray); line-height: 1.7; }
  .queue-buyer-type { font-size: 10px; padding: 2px 7px; border: 1px solid var(--border); color: var(--mid-gray); white-space: nowrap; align-self: start; text-transform: uppercase; letter-spacing: 0.04em; }
  .queue-actions { display: flex; gap: 8px; margin-top: 8px; flex-wrap: wrap; }
  .action-btn { font-family: var(--font); font-size: 10px; font-weight: 700; letter-spacing: 0.04em; text-transform: uppercase; padding: 5px 10px; border: 1px solid; background: var(--white); cursor: pointer; transition: all 0.1s; }
  .action-btn-confirm { border-color: var(--available); color: var(--available); }
  .action-btn-confirm:hover { background: var(--available-bg); }
  .action-btn-expire { border-color: var(--pending); color: var(--pending); }
  .action-btn-expire:hover { background: var(--pending-bg); }
  .mark-sold-btn { font-family: var(--font); font-size: 10px; font-weight: 700; letter-spacing: 0.04em; text-transform: uppercase; padding: 7px 12px; border: 1px solid var(--mid-gray); background: transparent; color: var(--mid-gray); cursor: pointer; transition: all 0.1s; }
  .mark-sold-btn:hover { background: var(--light-gray); }

  /* CONFIRM MODAL */
  .confirm-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 200; align-items: center; justify-content: center; padding: 20px; }
  .confirm-overlay.open { display: flex; }
  .confirm-box { background: var(--white); border: 1px solid var(--border); padding: 32px 28px; max-width: 380px; width: 100%; }
  .confirm-box h3 { font-size: 16px; font-weight: 700; margin-bottom: 8px; }
  .confirm-box p { font-size: 12px; color: #444; line-height: 1.6; margin-bottom: 20px; }
  .confirm-actions { display: flex; gap: 8px; }
  .btn-full { flex: 1; padding: 10px; font-family: var(--font); font-size: 11px; font-weight: 700; letter-spacing: 0.04em; text-transform: uppercase; border: 1px solid; cursor: pointer; transition: all 0.1s; }
  .btn-confirm-yes { background: var(--black); color: var(--white); border-color: var(--black); }
  .btn-confirm-yes:hover { background: #333; }
  .btn-confirm-no { background: transparent; color: var(--black); border-color: var(--border); }
  .btn-confirm-no:hover { background: var(--off-white); }

  .status-bar { background: var(--white); border-top: 1px solid var(--border); padding: 10px 24px; font-size: 11px; color: var(--mid-gray); display: flex; align-items: center; gap: 8px; position: sticky; bottom: 0; }
  .pulse { display: inline-block; width: 6px; height: 6px; background: var(--available); border-radius: 50%; animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

  @media (max-width: 600px) {
    header { padding: 0 16px; }
    .stats-bar { padding: 0 16px; }
    .controls { padding: 12px 16px; }
    .work-list { padding: 12px 16px; }
    .work-row-header { grid-template-columns: 1fr auto; }
    .work-row-price { display: none; }
  }
</style>
</head>
<body>

<!-- LOGIN -->
<div class="login-screen" id="login-screen">
  <div class="login-box">
    <h1>Conners Conners</h1>
    <p class="sub">Volunteer dashboard — Fundraiser 2026</p>
    <label class="field-label">Password</label>
    <input type="password" class="field-input" id="password-input"
           placeholder="Enter volunteer password"
           onkeydown="if(event.key==='Enter'){event.preventDefault();attemptLogin();}">
    <div class="login-error" id="login-error">Incorrect password. Try again.</div>
    <button class="btn" type="button" onclick="attemptLogin()">Sign in</button>
  </div>
</div>

<!-- DASHBOARD -->
<div class="dashboard" id="dashboard">
  <header>
    <div style="display:flex;align-items:center">
      <span class="logo">Conners Conners</span>
      <span class="header-tag">Volunteer</span>
    </div>
    <div class="header-actions">
      <button class="btn-sm btn-sm-default" onclick="loadWorks()">↻ Refresh</button>
      <button class="btn-sm btn-sm-danger" onclick="confirmCloseAll()">Close all sales</button>
      <button class="btn-sm btn-sm-default" onclick="logout()">Sign out</button>
    </div>
  </header>

  <div class="stats-bar">
    <div class="stat"><span class="stat-value" id="stat-total">—</span><span class="stat-label">Total</span></div>
    <div class="stat"><span class="stat-value" id="stat-available">—</span><span class="stat-label">Available</span></div>
    <div class="stat"><span class="stat-value" id="stat-pending" style="color:var(--pending)">—</span><span class="stat-label">Pending</span></div>
    <div class="stat"><span class="stat-value" id="stat-sold" style="color:var(--mid-gray)">—</span><span class="stat-label">Sold</span></div>
    <div class="stat"><span class="stat-value" id="stat-revenue">—</span><span class="stat-label">Revenue</span></div>
  </div>

  <div class="controls">
    <input class="search-input" id="search-input" type="search" placeholder="Search artist or title…" oninput="renderList()">
    <select class="filter-select" id="filter-select" onchange="renderList()">
      <option value="all">All works</option>
      <option value="available">Available</option>
      <option value="pending">Pending</option>
      <option value="sold">Sold</option>
    </select>
    <button class="close-all-btn" onclick="confirmCloseAll()">⚠ Close all sales</button>
  </div>

  <div class="work-list" id="work-list">
    <p style="font-size:12px;color:var(--mid-gray);padding:20px 0">Loading works…</p>
  </div>

  <div class="status-bar">
    <span class="pulse"></span>
    <span id="last-updated">Auto-refreshes every 30 seconds</span>
  </div>
</div>

<!-- CONFIRM MODAL -->
<div class="confirm-overlay" id="confirm-overlay">
  <div class="confirm-box">
    <h3 id="confirm-title">Confirm action</h3>
    <p id="confirm-body">Are you sure?</p>
    <div class="confirm-actions">
      <button class="btn-full btn-confirm-yes" id="confirm-yes">Confirm</button>
      <button class="btn-full btn-confirm-no" onclick="closeConfirm()">Cancel</button>
    </div>
  </div>
</div>

<script>
const SHEET_API_URL = 'https://script.google.com/macros/s/AKfycbwXQRIeL7D7uVELVEhqsjO5BzHo3w-9KCN1ku_FNq5AvXWQQGGRRX6cb4KvkX80tclZ/exec';
const VOLUNTEER_PASSWORD = 'ccvolunteer2025'; // Change before the event
const AUTO_REFRESH = 30000;

let allWorks = [], refreshTimer = null, pendingAction = null;

// ---- AUTH ----
function attemptLogin() {
  const pwd = document.getElementById('password-input').value;
  if (pwd === VOLUNTEER_PASSWORD) {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('dashboard').classList.add('open');
    loadWorks();
    refreshTimer = setInterval(loadWorks, AUTO_REFRESH);
  } else {
    document.getElementById('login-error').style.display = 'block';
    document.getElementById('password-input').value = '';
    document.getElementById('password-input').focus();
  }
}

function logout() {
  clearInterval(refreshTimer);
  document.getElementById('dashboard').classList.remove('open');
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('password-input').value = '';
}

// ---- DATA ----
async function loadWorks() {
  try {
    const res = await fetch(SHEET_API_URL + '?action=getWorksAdmin&pwd=' + encodeURIComponent(VOLUNTEER_PASSWORD));
    const data = await res.json();
    if (data.works) {
      allWorks = data.works.filter(w => w.id && (w.artist || w.title));
      renderList(); updateStats();
      document.getElementById('last-updated').textContent =
        'Updated ' + new Date().toLocaleTimeString('en-AU', {hour:'2-digit',minute:'2-digit',second:'2-digit'});
    }
  } catch(e) { console.error('Refresh failed', e); }
}

async function sendAction(payload) {
  try {
    const res = await fetch(SHEET_API_URL, {
      method: 'POST',
      headers: {'Content-Type': 'text/plain'},
      body: JSON.stringify({...payload, pwd: VOLUNTEER_PASSWORD}),
    });
    const data = await res.json();
    if (data.works) {
      allWorks = data.works.filter(w => w.id && (w.artist || w.title));
      renderList(); updateStats();
    }
  } catch(e) { console.error('Action failed', e); }
}

// ---- RENDER ----
function renderList() {
  const search = document.getElementById('search-input').value.toLowerCase();
  const filter = document.getElementById('filter-select').value;
  let works = allWorks.filter(w => {
    const mf = filter === 'all' || w.status === filter;
    const ms = !search || (w.artist||'').toLowerCase().includes(search) || (w.title||'').toLowerCase().includes(search);
    return mf && ms;
  });
  works.sort((a,b) => {
    const o = {pending:0, available:1, sold:2};
    if (o[a.status] !== o[b.status]) return o[a.status] - o[b.status];
    return (b.queue?.length||0) - (a.queue?.length||0);
  });
  const list = document.getElementById('work-list');
  if (!works.length) { list.innerHTML = '<p style="font-size:12px;color:var(--mid-gray);padding:20px 0">No works match.</p>'; return; }
  list.innerHTML = works.map(w => buildRow(w)).join('');
}

function buildRow(w) {
  const qLen = w.queue?.length || 0;
  const queueItems = qLen === 0
    ? '<p class="queue-empty">No commitments yet.</p>'
    : w.queue.map((b,i) => `
        <div class="queue-item">
          <div class="queue-position ${i===0?'first':''}">${i+1}</div>
          <div>
            <div class="queue-buyer-name">${esc(b.name)}</div>
            <div class="queue-buyer-contact">${esc(b.email)}<br>${esc(b.phone)}${b.timestamp?'<br>'+fmt(b.timestamp):''}</div>
            ${i===0?`<div class="queue-actions">
              <button class="action-btn action-btn-confirm" onclick="confirmAction('confirmSold','${w.id}','Mark as sold to ${escA(b.name)}?','This will mark the work as sold and clear the queue.')">✓ Confirm sold</button>
              <button class="action-btn action-btn-expire" onclick="confirmAction('expireFirst','${w.id}','Expire this commitment?','${escA(b.name)} will be removed and the next person promoted.')">Expire</button>
            </div>`:''}
          </div>
          <span class="queue-buyer-type">${b.paymentType==='transfer'?'Transfer':'At desk'}</span>
        </div>`).join('');

  const actions = w.status !== 'sold'
    ? `<button class="mark-sold-btn" onclick="confirmAction('closeWork','${w.id}','Mark as sold?','Use this for works paid at the Square terminal on the night.')">Mark as sold</button>`
    : '';

  return `
    <div class="work-row status-${w.status}" id="row-${w.id}">
      <div class="work-row-header" onclick="toggleRow('${w.id}')">
        <div>
          <div class="work-row-artist">${esc(w.artist||'')}</div>
          <div class="work-row-title">${esc(w.title||'Untitled')}</div>
          <div class="work-row-meta">${[w.medium,w.dimensions].filter(Boolean).join(' · ')}</div>
        </div>
        <div class="work-row-price">${w.price?'$'+Number(w.price).toLocaleString():''}</div>
        <div class="work-row-badges">
          <span class="status-badge badge-${w.status}">${statusLabel(w.status)}</span>
          ${qLen>0?`<span class="queue-count">${qLen} in queue</span>`:''}
          <span class="chevron">▾</span>
        </div>
      </div>
      <div class="work-row-detail">
        <div class="detail-inner">
          <div class="queue-section"><h4>Purchase queue</h4>${queueItems}</div>
          ${actions}
        </div>
      </div>
    </div>`;
}

function toggleRow(id) {
  document.getElementById('row-'+id)?.classList.toggle('expanded');
}

function updateStats() {
  document.getElementById('stat-total').textContent = allWorks.length;
  document.getElementById('stat-available').textContent = allWorks.filter(w=>w.status==='available').length;
  document.getElementById('stat-pending').textContent = allWorks.filter(w=>w.status==='pending').length;
  document.getElementById('stat-sold').textContent = allWorks.filter(w=>w.status==='sold').length;
  const rev = allWorks.filter(w=>w.status==='sold').reduce((s,w)=>s+Number(w.price||0),0);
  document.getElementById('stat-revenue').textContent = rev > 0 ? '$'+rev.toLocaleString() : '—';
}

// ---- CONFIRM ----
function confirmAction(action, workId, title, body) {
  pendingAction = {action, workId};
  document.getElementById('confirm-title').textContent = title;
  document.getElementById('confirm-body').textContent = body;
  document.getElementById('confirm-overlay').classList.add('open');
  document.getElementById('confirm-yes').onclick = executePending;
}

function confirmCloseAll() {
  pendingAction = {action:'closeAll'};
  document.getElementById('confirm-title').textContent = 'Close all sales?';
  document.getElementById('confirm-body').textContent = 'This will mark ALL remaining works as sold and clear all queues. This cannot be undone.';
  document.getElementById('confirm-overlay').classList.add('open');
  document.getElementById('confirm-yes').onclick = executePending;
}

async function executePending() {
  closeConfirm();
  if (pendingAction) { await sendAction(pendingAction); pendingAction = null; }
}

function closeConfirm() { document.getElementById('confirm-overlay').classList.remove('open'); }
document.addEventListener('keydown', e => { if (e.key==='Escape') closeConfirm(); });

// ---- HELPERS ----
function statusLabel(s) { return s==='sold'?'Sold':s==='pending'?'Pending':'Available'; }
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function escA(s) { return String(s||'').replace(/'/g,"\\'").replace(/"/g,'\\"'); }
function fmt(ts) { try { return new Date(ts).toLocaleTimeString('en-AU',{hour:'2-digit',minute:'2-digit'}); } catch{return '';} }
</script>
</body>
</html>
